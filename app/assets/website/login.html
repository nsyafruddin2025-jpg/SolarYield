<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login — SolarYield</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1E3A5F 0%, #0d2137 100%);
            padding: 2rem;
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo img {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
        }

        .login-logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1E3A5F;
            margin-bottom: 0.5rem;
        }

        .login-logo p {
            font-size: 0.9375rem;
            color: #64748b;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #1E3A5F;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #F4A836;
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .btn-login {
            width: 100%;
            background: #F4A836;
            color: #1E3A5F;
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: #e09520;
            transform: translateY(-2px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .demo-hint {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
        }

        .demo-hint p {
            font-size: 0.8125rem;
            color: #64748b;
            margin-bottom: 0.5rem;
        }

        .demo-hint code {
            background: #f3f4f6;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #1E3A5F;
        }

        .error-message {
            display: none;
            background: #fef2f2;
            border: 1px solid #ef4444;
            color: #dc2626;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            text-align: center;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #F4A836;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <img src="logo.png" alt="SolarYield">
            <h1>Client Portal</h1>
            <p>Sign in to access your forecasting dashboard</p>
        </div>

        <div class="error-message" id="error-message">
            Invalid email or password
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="operator@solaryield.io" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="demo-hint">
            <p>Demo Credentials:</p>
            <p><code>admin@solaryield.io</code> / <code>SolarYield2026</code></p>
            <p>or</p>
            <p><code>operator@sembcorp.com</code> / <code>Sembcorp2026</code></p>
        </div>

        <a href="index.html" class="back-link">← Back to SolarYield</a>
    </div>

    <script>
        const DASHBOARD_URL = 'https://solaryield-gfdus3knta7y95aauta5mt.streamlit.app';

        const VALID_CREDENTIALS = [
            { email: 'admin@solaryield.io', password: 'SolarYield2026' },
            { email: 'operator@sembcorp.com', password: 'Sembcorp2026' }
        ];

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            // Hide any existing error
            errorMessage.style.display = 'none';

            // Check credentials
            const isValid = VALID_CREDENTIALS.some(
                cred => cred.email === email && cred.password === password
            );

            if (isValid) {
                // Redirect to dashboard
                window.location.href = DASHBOARD_URL;
            } else {
                // Show error
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
